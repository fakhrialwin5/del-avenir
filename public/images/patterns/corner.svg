<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cornerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Corner decoration -->
  <path d="M0,0 L200,0 L200,20 L20,20 L20,200 L0,200 Z" fill="url(#cornerGrad)"/>
  <!-- Inner arc -->
  <path d="M0,0 Q100,0 100,100 Q100,0 200,0" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <!-- Diamond accent -->
  <polygon points="50,5 55,15 50,25 45,15" fill="#D4AF37" opacity="0.4"/>
</svg>