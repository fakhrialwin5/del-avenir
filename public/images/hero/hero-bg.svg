<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFDF7;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#F4E5B5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#F4E5B5"/>
    </linearGradient>
  </defs>
  <!-- Sky Background -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  
  <!-- Distant mosque silhouettes -->
  <g opacity="0.06" fill="#1B5E20">
    <!-- Main Mosque -->
    <path d="M800,700 L800,500 Q860,400 920,500 L920,700 Z"/>
    <ellipse cx="860" cy="500" rx="70" ry="100"/>
    <!-- Minaret left -->
    <rect x="720" y="450" width="20" height="250"/>
    <circle cx="730" cy="450" r="15"/>
    <!-- Minaret right -->
    <rect x="980" y="450" width="20" height="250"/>
    <circle cx="990" cy="450" r="15"/>
    <!-- Small mosque left -->
    <path d="M200,700 L200,600 Q250,540 300,600 L300,700 Z"/>
    <ellipse cx="250" cy="600" rx="50" ry="70"/>
    <!-- Small mosque right -->
    <path d="M1500,700 L1500,580 Q1560,510 1620,580 L1620,700 Z"/>
    <ellipse cx="1560" cy="580" rx="60" ry="80"/>
  </g>
  
  <!-- Ground line -->
  <path d="M0,750 Q480,720 960,740 Q1440,760 1920,730 L1920,1080 L0,1080 Z" fill="#1B5E20" opacity="0.03"/>
  
  <!-- Decorative circles (bokeh effect) -->
  <circle cx="150" cy="200" r="80" fill="#D4AF37" opacity="0.04"/>
  <circle cx="1700" cy="300" r="120" fill="#D4AF37" opacity="0.03"/>
  <circle cx="400" cy="800" r="60" fill="#1B5E20" opacity="0.03"/>
  <circle cx="1600" cy="900" r="100" fill="#1B5E20" opacity="0.02"/>
  
  <!-- Stars / Light dots -->
  <circle cx="200" cy="100" r="2" fill="#D4AF37" opacity="0.2"/>
  <circle cx="500" cy="150" r="1.5" fill="#D4AF37" opacity="0.15"/>
  <circle cx="800" cy="80" r="2" fill="#D4AF37" opacity="0.2"/>
  <circle cx="1100" cy="120" r="1.5" fill="#D4AF37" opacity="0.15"/>
  <circle cx="1400" cy="90" r="2" fill="#D4AF37" opacity="0.2"/>
  <circle cx="1700" cy="140" r="1.5" fill="#D4AF37" opacity="0.15"/>
  <circle cx="350" cy="250" r="1" fill="#D4AF37" opacity="0.1"/>
  <circle cx="1250" cy="200" r="1" fill="#D4AF37" opacity="0.1"/>
</svg>