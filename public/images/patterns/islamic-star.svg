<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <style>
      .pattern-line { stroke: #D4AF37; stroke-width: 0.5; fill: none; opacity: 0.15; }
      .pattern-accent { fill: #D4AF37; opacity: 0.1; }
    </style>
  </defs>
  <!-- Islamic 8-pointed star pattern -->
  <g transform="translate(100,100)">
    <!-- Star -->
    <polygon class="pattern-accent" points="0,-60 17,-17 60,0 17,17 0,60 -17,17 -60,0 -17,-17"/>
    <!-- Inner star -->
    <polygon class="pattern-line" points="0,-40 11,-11 40,0 11,11 0,40 -11,11 -40,0 -11,-11"/>
    <!-- Circle -->
    <circle class="pattern-line" cx="0" cy="0" r="30"/>
    <!-- Radiating lines -->
    <line class="pattern-line" x1="0" y1="-60" x2="0" y2="-80"/>
    <line class="pattern-line" x1="42" y1="-42" x2="56" y2="-56"/>
    <line class="pattern-line" x1="60" y1="0" x2="80" y2="0"/>
    <line class="pattern-line" x1="42" y1="42" x2="56" y2="56"/>
    <line class="pattern-line" x1="0" y1="60" x2="0" y2="80"/>
    <line class="pattern-line" x1="-42" y1="42" x2="-56" y2="56"/>
    <line class="pattern-line" x1="-60" y1="0" x2="-80" y2="0"/>
    <line class="pattern-line" x1="-42" y1="-42" x2="-56" y2="-56"/>
  </g>
  <!-- Corner decorations -->
  <g transform="translate(0,0)">
    <polygon class="pattern-accent" points="0,0 30,0 15,15"/>
    <polygon class="pattern-accent" points="0,0 0,30 15,15"/>
  </g>
  <g transform="translate(200,0)">
    <polygon class="pattern-accent" points="0,0 -30,0 -15,15"/>
    <polygon class="pattern-accent" points="0,0 0,30 -15,15"/>
  </g>
  <g transform="translate(0,200)">
    <polygon class="pattern-accent" points="0,0 30,0 15,-15"/>
    <polygon class="pattern-accent" points="0,0 0,-30 15,-15"/>
  </g>
  <g transform="translate(200,200)">
    <polygon class="pattern-accent" points="0,0 -30,0 -15,-15"/>
    <polygon class="pattern-accent" points="0,0 0,-30 -15,-15"/>
  </g>
</svg>