<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="muhGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#B8960C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1"/>
    </linearGradient>
    <pattern id="muhPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="30" fill="none" stroke="#1B5E20" stroke-width="0.5" opacity="0.1"/>
      <circle cx="40" cy="40" r="20" fill="none" stroke="#1B5E20" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1920" height="600" fill="url(#muhGrad)"/>
  <rect width="1920" height="600" fill="url(#muhPattern)"/>
  <!-- Stage/curtain hints -->
  <g opacity="0.08" fill="#1B5E20">
    <path d="M0,0 Q200,100 400,0 L400,600 L0,600 Z"/>
    <path d="M1520,0 Q1720,100 1920,0 L1920,600 L1520,600 Z"/>
  </g>
  <!-- Spotlight circles -->
  <circle cx="960" cy="100" r="300" fill="white" opacity="0.05"/>
  <circle cx="960" cy="200" r="200" fill="white" opacity="0.08"/>
</svg>